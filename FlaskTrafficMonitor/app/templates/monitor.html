{% extends "base.html" %}

{% set active_page = 'monitor' %}
{% set title = '实时监控' %}
{% set subtitle = '视频流实时检测' %}

{% block content %}
<div class="row animate-fade-in">
    <!-- 视频选择区域 -->
    <div class="col-lg-12 mb-4">
        <div class="card-dark">
            <div class="card-header-dark card-header">
                <h5 class="card-title font-weight-bold">
                    <i class="fas fa-video mr-2"></i> 视频选择
                </h5>
            </div>
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-3">
                        <select id="video-select" class="form-select bg-dark border-gray-700 text-white">
                            <option value="">选择视频文件</option>
                            {% for video in videos %}
                            <option value="{{ video }}">{{ video }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select id="stream-mode" class="form-select bg-dark border-gray-700 text-white">
                            <option value="detect">带检测</option>
                            <option value="normal">仅视频</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary-custom mr-2" id="start-stream" disabled>
                            <i class="fas fa-play mr-1"></i> 开始播放
                        </button>
                        <button class="btn btn-secondary mr-2" id="stop-stream" disabled>
                            <i class="fas fa-stop mr-1"></i> 停止播放
                        </button>
                        <button class="btn btn-success" id="save-record" disabled>
                            <i class="fas fa-save mr-1"></i> 保存记录
                        </button>
                    </div>
                    <div class="col-md-3 text-end">
                        <span class="text-sm text-secondary">
                            状态: <span id="stream-status" class="text-danger">未连接</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 视频显示区域 -->
    <div class="col-lg-8">
        <div class="card-dark">
            <div class="card-header-dark card-header d-flex justify-content-between">
                <h5 class="card-title font-weight-bold">
                    <i class="fas fa-eye mr-2"></i> 实时检测画面
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="video-container" id="video-container" style="position: relative; width: 100%;">
                    <div class="placeholder-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; background-color: #1a1a2e;">
                        <i class="fas fa-video" style="font-size: 64px; color: #4b5563;"></i>
                        <p class="mt-4 text-secondary">请选择视频并点击开始检测</p>
                    </div>
                    <img id="videoArea" style="display: none; width: 100%;" />
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧数据面板 -->
    <div class="col-lg-4">
        <!-- 实时统计卡片 -->
        <div class="card-dark mb-4">
            <div class="card-header-dark card-header">
                <h5 class="card-title font-weight-bold">
                    <i class="fas fa-chart-line mr-2"></i> 实时统计
                </h5>
            </div>
            <div class="card-body">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-800 rounded-lg p-3 text-center">
                        <div class="text-2xl font-bold text-primary" id="total-count">0</div>
                        <div class="text-sm text-secondary">总车流量</div>
                    </div>
                    <div class="bg-gray-800 rounded-lg p-3 text-center">
                        <div class="text-2xl font-bold text-blue" id="avg-speed">0</div>
                        <div class="text-sm text-secondary">平均车速 (km/h)</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 车型统计 -->
        <div class="card-dark mb-4">
            <div class="card-header-dark card-header">
                <h5 class="card-title font-weight-bold">
                    <i class="fas fa-car mr-2"></i> 车型统计
                </h5>
            </div>
            <div class="card-body">
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-secondary">轿车</span>
                        <span class="text-white font-medium" id="car-count">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-secondary">公交车</span>
                        <span class="text-white font-medium" id="bus-count">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-secondary">货车</span>
                        <span class="text-white font-medium" id="truck-count">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 拥堵状态 -->
        <div class="card-dark">
            <div class="card-header-dark card-header">
                <h5 class="card-title font-weight-bold">
                    <i class="fas fa-traffic-light mr-2"></i> 拥堵状态
                </h5>
            </div>
            <div class="card-body">
                <div class="text-center">
                    <div class="text-4xl font-bold mb-2" id="congestion-value">0</div>
                    <div class="text-sm" id="congestion-status">畅通</div>
                    <div class="mt-3">
                        <div class="w-full bg-gray-700 rounded-full h-3">
                            <div class="h-3 rounded-full transition-all bg-green" id="congestion-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 保存记录模态框 -->
<div class="modal fade" id="saveRecordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-save text-success"></i> 保存监测记录
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">视频名称</label>
                    <input type="text" class="form-control bg-secondary text-white" id="record-video-name" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">总车流量</label>
                    <input type="text" class="form-control bg-secondary text-white" id="record-total-count" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">平均速度 (km/h)</label>
                    <input type="text" class="form-control bg-secondary text-white" id="record-avg-speed" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">车型统计</label>
                    <div class="row">
                        <div class="col-4">
                            <input type="text" class="form-control bg-secondary text-white text-center" id="record-car-count" readonly>
                            <small class="text-secondary d-block text-center">轿车</small>
                        </div>
                        <div class="col-4">
                            <input type="text" class="form-control bg-secondary text-white text-center" id="record-truck-count" readonly>
                            <small class="text-secondary d-block text-center">货车</small>
                        </div>
                        <div class="col-4">
                            <input type="text" class="form-control bg-secondary text-white text-center" id="record-bus-count" readonly>
                            <small class="text-secondary d-block text-center">公交</small>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">备注信息</label>
                    <textarea class="form-control bg-secondary text-white" id="record-notes" rows="3" placeholder="请输入备注信息（可选）"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" id="confirmSaveBtn">
                    <i class="fas fa-save"></i> 确认保存
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 播放视频
function play() {
    var file = document.getElementById("video-select").value;
    var mode = document.getElementById("stream-mode").value;
    
    console.log('播放文件:', file);
    console.log('播放模式:', mode);
    
    var img = document.getElementById("videoArea");
    img.src = '/video_feed?file=' + encodeURIComponent(file) + '&mode=' + mode;
    img.style.display = 'block';
    document.querySelector('.placeholder-content').style.display = 'none';
    
    document.getElementById('start-stream').disabled = true;
    document.getElementById('stop-stream').disabled = false;
    document.getElementById('video-select').disabled = true;
    document.getElementById('stream-mode').disabled = true;
    document.getElementById('stream-status').textContent = mode === 'detect' ? '检测中' : '播放中';
    document.getElementById('stream-status').className = 'text-green';
}

// 停止播放
function stop() {
    document.getElementById("videoArea").src = "";
    document.getElementById("videoArea").style.display = 'none';
    document.querySelector('.placeholder-content').style.display = 'flex';

    document.getElementById('start-stream').disabled = false;
    document.getElementById('stop-stream').disabled = true;
    document.getElementById('save-record').disabled = false;  // 启用保存按钮
    document.getElementById('video-select').disabled = false;
    document.getElementById('stream-mode').disabled = false;
    document.getElementById('stream-status').textContent = '已停止';
    document.getElementById('stream-status').className = 'text-yellow';

    // 自动弹出保存对话框
    showSaveModal();
}

// 显示保存对话框
function showSaveModal() {
    var videoName = document.getElementById("video-select").value;

    // 填充当前数据到模态框
    document.getElementById('record-video-name').value = videoName;
    document.getElementById('record-total-count').value = document.getElementById('total-count').textContent;
    document.getElementById('record-avg-speed').value = document.getElementById('avg-speed').textContent;
    document.getElementById('record-car-count').value = document.getElementById('car-count').textContent;
    document.getElementById('record-truck-count').value = document.getElementById('truck-count').textContent;
    document.getElementById('record-bus-count').value = document.getElementById('bus-count').textContent;
    document.getElementById('record-notes').value = '';

    // 显示模态框
    var modal = new bootstrap.Modal(document.getElementById('saveRecordModal'));
    modal.show();
}

// 保存记录
async function saveRecord() {
    var videoName = document.getElementById("video-select").value;

    if (!videoName) {
        alert('请先选择视频文件');
        return;
    }

    showSaveModal();
}

// 确认保存
async function confirmSave() {
    var videoName = document.getElementById('record-video-name').value;
    var notes = document.getElementById('record-notes').value;

    try {
        const response = await fetch('/api/save_record', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                video_name: videoName,
                notes: notes
            })
        });

        const data = await response.json();

        if (data.status === 'success') {
            // 关闭模态框
            bootstrap.Modal.getInstance(document.getElementById('saveRecordModal')).hide();

            // 显示成功消息
            showSuccessMessage('记录保存成功！记录ID: ' + data.record_id);

            // 禁用保存按钮
            document.getElementById('save-record').disabled = true;
        } else {
            alert('保存失败: ' + data.message);
        }
    } catch (error) {
        console.error('保存失败:', error);
        alert('保存失败: ' + error.message);
    }
}

// 显示成功消息
function showSuccessMessage(message) {
    // 创建成功提示
    var alertDiv = document.createElement('div');
    alertDiv.className = 'alert alert-success alert-dismissible fade show';
    alertDiv.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
    alertDiv.innerHTML = `
        <i class="fas fa-check-circle"></i> ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(alertDiv);

    // 3秒后自动关闭
    setTimeout(function() {
        alertDiv.remove();
    }, 3000);
}

// 定时刷新数据
setInterval(function() {
    fetch('/data')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            console.log('收到数据:', data);
            
            document.getElementById('total-count').textContent = data.total_flow || 0;
            document.getElementById('avg-speed').textContent = data.avg_speed || 0;
            document.getElementById('car-count').textContent = data.car || 0;
            document.getElementById('bus-count').textContent = data.bus || 0;
            document.getElementById('truck-count').textContent = data.truck || 0;
            
            var congestionValue = data.congestion || 0;
            var congestionLevel = congestionValue > 50 ? '拥堵' : '畅通';
            document.getElementById('congestion-value').textContent = congestionValue;
            document.getElementById('congestion-status').textContent = congestionLevel;
            
            var bar = document.getElementById('congestion-bar');
            bar.className = 'h-3 rounded-full transition-all ' + (congestionLevel === '畅通' ? 'bg-green' : 'bg-red');
            bar.style.width = congestionValue + '%';
        })
        .catch(function(error) { console.error('加载失败:', error); });
}, 500);

// 页面加载完成后绑定事件
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('start-stream').addEventListener('click', play);
    document.getElementById('stop-stream').addEventListener('click', stop);
    document.getElementById('save-record').addEventListener('click', saveRecord);
    document.getElementById('confirmSaveBtn').addEventListener('click', confirmSave);

    document.getElementById('video-select').addEventListener('change', function() {
        document.getElementById('start-stream').disabled = this.value === '';
    });
});
</script>
{% endblock %}
