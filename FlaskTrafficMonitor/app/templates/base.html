<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能交通视觉监测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #00d4aa;
            --dark-bg: #0a0e17;
            --dark-card: #111827;
            --dark-border: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
        }
        
        .sidebar {
            background: linear-gradient(180deg, #1a202c 0%, #0d1117 100%);
            min-height: 100vh;
            border-right: 1px solid var(--dark-border);
        }
        
        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 12px 20px;
            margin: 4px 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: var(--text-primary);
            background: linear-gradient(135deg, rgba(0,123,255,0.2) 0%, rgba(0,212,170,0.1) 100%);
            border-left: 3px solid var(--primary-color);
        }
        
        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
        }
        
        .top-nav {
            background: linear-gradient(90deg, #1a202c 0%, #111827 100%);
            border-bottom: 1px solid var(--dark-border);
        }
        
        .top-nav .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .status-online {
            background: rgba(0, 212, 170, 0.2);
            color: var(--secondary-color);
        }
        
        .status-offline {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .card-dark {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .card-dark:hover {
            border-color: rgba(0, 123, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.1);
        }
        
        .card-header-dark {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--dark-border);
            border-radius: 12px 12px 0 0 !important;
        }
        
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 8px;
        }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.4);
        }
        
        .progress-bar-custom {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }
        
        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .video-container video,
        .video-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .video-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            font-size: 12px;
            color: var(--secondary-color);
        }
        
        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .traffic-light.green {
            background: var(--secondary-color);
            box-shadow: 0 0 10px var(--secondary-color);
        }
        
        .traffic-light.red {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
            }
            
            .sidebar .nav-link {
                padding: 10px 15px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- 左侧侧边栏 -->
            <nav class="col-lg-2 col-md-3 sidebar d-flex flex-column">
                <div class="p-4 border-bottom border-dark">
                    <h3 class="text-primary font-weight-bold">
                        <i class="fas fa-car"></i> 交通监测
                    </h3>
                </div>
                <div class="flex-grow-1 p-2">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'index' else '' }}" href="/">
                                <i class="fas fa-home"></i> 首页大屏
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'upload' else '' }}" href="/upload">
                                <i class="fas fa-upload"></i> 视频上传
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'monitor' else '' }}" href="/monitor">
                                <i class="fas fa-video"></i> 实时监控
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'statistics' else '' }}" href="/statistics">
                                <i class="fas fa-chart-bar"></i> 数据报表
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'heatmap' else '' }}" href="/heatmap">
                                <i class="fas fa-thermometer-three-quarters"></i> 热力图
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {{ 'active' if active_page == 'history' else '' }}" href="/history">
                                <i class="fas fa-history"></i> 历史记录
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="p-3 border-top border-dark">
                    <div class="d-flex align-items-center">
                        <div class="traffic-light green mr-2"></div>
                        <span class="text-sm text-secondary">系统运行中</span>
                    </div>
                </div>
            </nav>
            
            <!-- 主内容区域 -->
            <main class="col-lg-10 col-md-9">
                <!-- 顶部导航 -->
                <header class="top-nav px-4 py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h1 class="h4 font-weight-bold">{{ title }}</h1>
                            <p class="text-sm text-secondary">{{ subtitle }}</p>
                        </div>
                        <div class="d-flex align-items-center">
                            <span class="status-badge status-online">
                                <i class="fas fa-circle fa-xs mr-1"></i> 实时在线
                            </span>
                            <span class="ml-3 text-sm text-secondary">
                                {{ current_time }}
                            </span>
                        </div>
                    </div>
                </header>
                
                <!-- 页面内容 -->
                <div class="p-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // 更新当前时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            var timeEl = document.querySelector('.status-badge + span');
            if (timeEl) timeEl.textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
